<h2 mat-dialog-title>Change Password</h2>
<mat-dialog-content>
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="password-form">

    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Current Password</mat-label>
      <input matInput formControlName="currentPassword" [type]="hideCurrent ? 'password' : 'text'" placeholder="Enter current password">
      <button mat-icon-button matSuffix (click)="hideCurrent = !hideCurrent" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideCurrent" type="button">
        <mat-icon>{{hideCurrent ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.get('currentPassword')?.hasError('required')">
        Current password is required.
      </mat-error>
      <mat-error *ngIf="passwordForm.get('currentPassword')?.hasError('incorrect')">
        Current password is incorrect.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput formControlName="newPassword" [type]="hideNew ? 'password' : 'text'" placeholder="Enter new password">
      <button mat-icon-button matSuffix (click)="hideNew = !hideNew" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideNew" type="button">
        <mat-icon>{{hideNew ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.get('newPassword')?.hasError('required')">
        Required to enter new password.
      </mat-error>
      <mat-error *ngIf="passwordForm.get('newPassword')?.hasError('minlength')">
        Must be at least 6 characters.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm New Password</mat-label>
      <input matInput formControlName="confirmPassword" [type]="hideConfirm ? 'password' : 'text'" placeholder="Confirm new password">
      <button mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideConfirm" type="button">
        <mat-icon>{{hideConfirm ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched">
        Passwords do not match.
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="passwordForm.invalid || isSubmitting" (click)="onSubmit()">
    {{ isSubmitting ? 'Updating...' : 'Update Password' }}
  </button>
</mat-dialog-actions>
