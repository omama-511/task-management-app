<h2 mat-dialog-title>Change Password</h2>
<mat-dialog-content>
    <form [formGroup]="passwordForm" class="password-form">
        <mat-form-field appearance="outline">
            <mat-label>Current Password</mat-label>
            <input matInput [type]="hideCurrent ? 'password' : 'text'" formControlName="currentPassword" required>
            <button mat-icon-button matSuffix (click)="hideCurrent = !hideCurrent" type="button">
                <mat-icon>{{hideCurrent ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="passwordForm.get('currentPassword')?.hasError('incorrect')">
                Incorrect current password
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>New Password</mat-label>
            <input matInput [type]="hideNew ? 'password' : 'text'" formControlName="newPassword" required>
            <button mat-icon-button matSuffix (click)="hideNew = !hideNew" type="button">
                <mat-icon>{{hideNew ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-hint>Minimum 6 characters</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Confirm New Password</mat-label>
            <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" required>
            <button mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm" type="button">
                <mat-icon>{{hideConfirm ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="passwordForm.hasError('mismatch')">
                Passwords do not match
            </mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="errorMessage">{{errorMessage}}</div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()" [disabled]="isSubmitting">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" 
            [disabled]="passwordForm.invalid || isSubmitting">
        <span *ngIf="!isSubmitting">Change Password</span>
        <span *ngIf="isSubmitting">Changing...</span>
    </button>
</mat-dialog-actions>
