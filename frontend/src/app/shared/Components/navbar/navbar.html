<mat-toolbar class="app-toolbar">
    <span class="spacer"></span>
    <div class="brand-container" routerLink="/">
        <mat-icon class="brand-icon">task_alt</mat-icon>
        <span class="brand-title">Task Manager</span>
    </div>
    <span class="spacer"></span>

    <!-- Show Tasks if logged in -->
    <a mat-button color="primary" routerLink="/tasks" *ngIf="auth.isAuthenticated">Tasks</a>

    <!-- Show Login/Register if NOT logged in -->
    <a mat-button color="primary" routerLink="/auth/login" *ngIf="!auth.isAuthenticated">Login</a>
    <a mat-raised-button color="primary" routerLink="/auth/register" *ngIf="!auth.isAuthenticated">Register</a>

    <!-- Theme Toggle -->
    <button mat-icon-button (click)="toggleTheme()" title="Toggle Dark Mode">
        <mat-icon>{{ (themeService.isDarkTheme$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Logout button -->
    <button mat-button color="warn" (click)="logout()" *ngIf="auth.isAuthenticated">Logout</button>
</mat-toolbar>
